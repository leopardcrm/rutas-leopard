services:
  - type: web
    name: rutas-leopard
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 5000
      - key: DATA_PATH
        value: /data/data.json
